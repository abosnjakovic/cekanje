name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string
      create_new_release:
        description: 'Create new GitHub release'
        required: true
        type: boolean
        default: true
      release_tag:
        description: 'Tag name for release (defaults to v{version})'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: Get version from tag or input
        id: get_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
            tag="${INPUT_TAG:-v$INPUT_VERSION}"
          else
            version="${GITHUB_REF_NAME#v}"
            tag="$GITHUB_REF_NAME"
          fi
          {
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"
          echo "Version: $version, Tag: $tag"

      - name: Create Release
        if: github.event_name == 'push' || github.event.inputs.create_new_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.get_version.outputs.version }}
          TAG: ${{ steps.get_version.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
            exit 0
          fi

          notes="Release $VERSION

          ## Installation

          ### Homebrew (macOS)
          \`\`\`
          brew tap $REPO https://github.com/$REPO
          brew install cekanje
          \`\`\`

          ### cargo
          \`\`\`
          cargo install cekanje
          \`\`\`

          ### Pre-built binaries
          See assets below."

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Release $TAG" \
            --notes "$notes" \
            --draft=false \
            --prerelease=false

  build-release:
    name: Build Release
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
            suffix: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          SUFFIX: ${{ matrix.suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/$TARGET/release"
          archive="cekanje-$VERSION-$SUFFIX.tar.gz"
          tar czf "$archive" cekanje
          ls -la "$archive"

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.create-release.outputs.version }}
          SUFFIX: ${{ matrix.suffix }}
          TARGET: ${{ matrix.target }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          archive="cekanje-$VERSION-$SUFFIX.tar.gz"
          gh release upload "$TAG" \
            --repo "$REPO" \
            "target/$TARGET/release/$archive"

  update-homebrew-formula:
    name: Update Homebrew Formula
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Calculate SHA256 hashes
        id: sha256
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.create-release.outputs.version }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          aarch64_url="https://github.com/$REPO/releases/download/$TAG/cekanje-$VERSION-aarch64-apple-darwin.tar.gz"
          aarch64_sha256=$(curl -sL "$aarch64_url" | sha256sum | cut -d' ' -f1)
          x86_url="https://github.com/$REPO/releases/download/$TAG/cekanje-$VERSION-x86_64-apple-darwin.tar.gz"
          x86_sha256=$(curl -sL "$x86_url" | sha256sum | cut -d' ' -f1)
          {
            echo "aarch64_sha256=$aarch64_sha256"
            echo "x86_sha256=$x86_sha256"
          } >> "$GITHUB_OUTPUT"
          echo "Apple Silicon: $aarch64_sha256"
          echo "Intel:         $x86_sha256"

      - name: Generate and commit Homebrew Formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.create-release.outputs.version }}
          TAG: ${{ needs.create-release.outputs.tag }}
          AARCH64_SHA: ${{ steps.sha256.outputs.aarch64_sha256 }}
          X86_SHA: ${{ steps.sha256.outputs.x86_sha256 }}
        run: |
          cat > /tmp/cekanje.rb << EOF
          class Cekanje < Formula
            desc "tmux notifier daemon for Claude Code sessions"
            homepage "https://github.com/$REPO"
            version "$VERSION"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/$REPO/releases/download/$TAG/cekanje-$VERSION-aarch64-apple-darwin.tar.gz"
                sha256 "$AARCH64_SHA"
              else
                url "https://github.com/$REPO/releases/download/$TAG/cekanje-$VERSION-x86_64-apple-darwin.tar.gz"
                sha256 "$X86_SHA"
              end
            end

            def install
              bin.install "cekanje"
              bin.install_symlink "cekanje" => "cek"
            end

            test do
              system "#{bin}/cekanje", "--version"
            end
          end
          EOF

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          main_repo_url="https://x-access-token:$HOMEBREW_TAP_TOKEN@github.com/$REPO.git"
          git clone "$main_repo_url" main-repo
          cd main-repo
          mkdir -p Formula
          cp /tmp/cekanje.rb Formula/cekanje.rb

          git add Formula/cekanje.rb
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update cekanje formula to $VERSION"
            git push origin main
          fi

  publish-crates:
    name: Publish to crates.io
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --allow-dirty
